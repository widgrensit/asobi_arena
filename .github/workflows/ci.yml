name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  repository_dispatch:
    types: [asobi-updated]

permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    name: Erlang CI
    uses: Taure/erlang-ci/.github/workflows/ci.yml@main
    with:
      version-file: '.tool-versions'
      enable-ct: true
      enable-audit: true
      enable-sbom: true
      enable-sbom-scan: true
      enable-dependency-submission: true
      enable-summary: true
      extra-services-compose: 'docker-compose.yml'
